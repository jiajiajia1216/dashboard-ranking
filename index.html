var GC={A:"#4ade80",B:"#60a5fa",C:"#fb923c",D:"#f87171"},

document.getElementById("sb").addEventListener("click",doSearch);
document.getElementById("si").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});

function doSearch(){
  var q=document.getElementById("si").value.trim(),res=document.getElementById("res");
  if(!q){res.classList.remove("show");res.innerHTML="";return}
  var found=ALL.filter(function(p){return p.name&&p.name.indexOf(q)!==-1});
  found.sort(function(a,b){return(a.rank||999)-(b.rank||999)});
  if(!found.length){
    res.innerHTML='<div class="nr">未找到包含 "'+q+'" 的操盘手</div>';
    res.classList.add("show");return}
  if(found.length===1){showResult(found[0]);return}
  var h='<div style="margin-bottom:10px;font-size:13px;color:var(--t3)">找到 <b style="color:var(--t2)">'+found.length+'</b> 人，点击查看详情：</div><div style="display:flex;flex-wrap:wrap;gap:8px">';
  found.forEach(function(p){
    var gc=p.grade==="A"?"gA":p.grade==="B"?"gB":p.grade==="C"?"gC":"gD";
    h+='<span class="ml" data-sn="'+p.name+'">'+p.name+' <span class="gg '+gc+'">'+p.grade+'</span> <span style="color:var(--t3);font-size:12px">'+p.total+'分</span></span>';
  });
  h+='</div>';
  res.innerHTML=h;
  res.classList.add("show");
  res.querySelectorAll("[data-sn]").forEach(function(el){
    el.addEventListener("click",function(){
      var nm=this.getAttribute("data-sn"),p=ALL.find(function(x){return x.name===nm});
      if(p)showResult(p);
    });
  });
}

function showResult(p){
  var res=document.getElementById("res"),bc=GC[p.grade]||"#60a5fa",
      gc=p.grade==="A"?"gA":p.grade==="B"?"gB":p.grade==="C"?"gC":"gD";
  var h='<div class="rh"><span class="rn2">'+p.name+'</span><span class="rmi">'+(p.city||"-")+' · '+(p.merchant||"-")+' · '+p.stores+' 家门店</span><span class="gg '+gc+'" style="font-size:14px;padding:4px 16px">'+p.grade+' 级</span><span style="color:var(--t3);font-size:13px">排名 #'+p.rank+'</span></div>';
  h+='<div class="rg">';
  DIM.forEach(function(name,i){
    var v=p[DK[i]]||0,mx=DM[i],pct=Math.round(v/mx*100);
    h+='<div class="ri"><div class="ri-l">'+name+'</div><div class="ri-s" style="color:'+bc+'">'+v+'<span style="font-size:14px;font-weight:400;color:var(--t3)"> / '+mx+'</span></div><div class="ri-b"><div class="ri-f" style="width:'+pct+'%;background:'+bc+'"></div></div><div class="ri-p">得分率 '+pct+'%</div></div>';
  });
  h+='<div class="rtot"><div><div class="tl">总得分</div><div class="ts" style="color:'+bc+'">'+p.total+'</div></div><div><div class="tl">满分</div><div style="font-size:20px;color:var(--t3)">100</div></div><div><div class="tl">综合得分率</div><div style="font-size:20px;font-weight:700;color:'+bc+'">'+p.total+'%</div></div></div>';
  h+='</div>';
  res.innerHTML=h;
  res.classList.add("show");
}


var ct={ALL:ALL.length,A:0,B:0,C:0,D:0};

document.getElementById("tabs").innerHTML='<span class="tl">筛选评级:</span>'+["ALL","A","B","C","D"].map(function(g){return'<button class="tab'+(g==="ALL"?" on":"")+'" data-g="'+g+'">'+(g==="ALL"?"全部":g+" 级")+'<span class="tc">'+ct[g]+"</span></button>"}).join("");

function renderTable(g){
  curGrade=g;
  var list=g==="ALL"?ALL:ALL.filter(function(p){return p.grade===g});
  list.sort(function(a,b){return(a.rank||999)-(b.rank||999)});
  var n=list.length,avg=n?(list.reduce(function(s,p){return s+(p.total||0)},0)/n).toFixed(1):"-",
      mx=n?list.reduce(function(m,p){return(p.total||0)>m.total?p:m},list[0]):null;
  document.getElementById("sum").innerHTML="共 <b>"+n+"</b> 人 &nbsp;|&nbsp; 平均总得分 <b>"+avg+"</b>"+(mx?" &nbsp;|&nbsp; 最高 <b>"+mx.total+"</b> ("+mx.name+")":"");
  if(!n){document.getElementById("tb").innerHTML='<tr><td colspan="15" class="em">当前评级暂无数据</td></tr>';return}
  var h="";
  list.forEach(function(p,i){
    var rk=i+1,rc=rk===1?"k1":rk===2?"k2":rk===3?"k3":"kx",bc=GC[p.grade]||"#60a5fa",
        gc=p.grade==="A"?"gA":p.grade==="B"?"gB":p.grade==="C"?"gC":"gD",sc="";
    DK.forEach(function(k,j){var v=p[k]||0,pc=Math.round(v/DM[j]*100);sc+='<td><div style="display:flex;align-items:center;gap:6px"><span style="width:32px;text-align:right;color:var(--t1);font-weight:600">'+v+'</span><div class="pb" style="flex:1;min-width:36px"><div class="pf" style="width:'+pc+'%;background:'+bc+'"></div></div></div></td>'});
    h+='<tr><td><span class="rk '+rc+'">'+rk+'</span></td><td style="font-weight:600;color:var(--t1)">'+p.name+'</td><td style="color:var(--t2)">'+(p.city||"-")+'</td><td>'+p.stores+'</td>'+sc+'<td style="font-weight:800;font-size:15px;color:'+bc+'">'+p.total+'</td><td><span class="gg '+gc+'">'+p.grade+'</span></td></tr>';
  });
  document.getElementById("tb").innerHTML=h;
}
renderTable("ALL");
document.getElementById("tabs").addEventListener("click",function(e){
  var t=e.target.closest(".tab");if(!t)return;
  this.querySelectorAll(".tab").forEach(function(b){b.classList.remove("on")});
  t.classList.add("on");renderTable(t.dataset.g);
});
