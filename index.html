function doSearch(){
  var q=document.getElementById("q").value.trim().toLowerCase(),rs=document.getElementById("rs");
  if(!q){rs.classList.remove("show");return}
  var found=ALL.filter(function(p){return p.name.toLowerCase().indexOf(q)>=0});
  if(!found.length){rs.innerHTML='<div class="nr">未找到匹配的操盘手</div>';rs.classList.add("show");return}
  var p=found[0],bc=GC[p.grade]||"#60a5fa",gc=p.grade==="A"?"gA":p.grade==="B"?"gB":p.grade==="C"?"gC":"gD",items="";
  var vals=[p.score_qw,p.score_xj,p.score_lx,p.score_o2o,p.score_wr,p.score_xd,p.score_px,p.score_hy,p.score_tb];
  var rates=[p.qw_rate_pct,p.xj_rate_pct,p.lx_val,p.o2o_rate_pct,p.wr_val,p.xd_val,null,null,null];
  var mxs=DM;
  DIM.forEach(function(d,i){
    var v=vals[i]||0,pc=Math.round(v/mxs[i]*100),isZero=v===0,
        fc=isZero?"var(--rd)":v>=mxs[i]?"var(--gn)":bc,
        zc=isZero?' res-zero':'',
        vb=isZero?'<span class="res-val" style="color:var(--rd)">'+v+'</span>':'<span class="res-val" style="color:'+fc+'">'+v+'</span>',
        detail="";
    if(i===6){

    }else if(i===7){
      detail='<span class="res-detail">会议 <b>'+p.hy_val+'</b>次</span>';
    }else if(i===8){
      detail='<span class="res-detail">通报 <b>'+p.tb_val+'</b>次</span>';
    }else{
      var rv=rates[i];
      if(rv!==undefined&&rv!==null){
        detail='<span class="res-detail">达成 <b>'+fmtRate(rv)+(UNIT[i]||"")+'</b></span>';
      }
    }
    items+='<div class="res-item'+zc+'"><div class="res-top"><span class="res-label">'+d+'</span><div class="res-bar-wrap"><div class="res-fill" style="width:'+pc+'%;background:'+fc+'"></div></div>'+vb+'</div>'+(detail?'<div class="res-bottom">'+detail+'</div>':'')+'</div>';
  });

    '<div class="rtot"><div><div class="tl">总得分 · 排名 #'+p.rank+'</div><div class="ts" style="color:'+bc+'">'+p.total+'</div></div></div>'+
    '<div class="res-grid">'+items+'</div>';
  rs.classList.add("show");
}

function renderTable(g){
  var list=g==="ALL"?ALL:ALL.filter(function(p){return p.grade===g});
  list.sort(function(a,b){return a.rank-b.rank});
  var n=list.length,
      h="";

  list.forEach(function(p){
    var rk=p.rank,rc=rk===1?"k1":rk===2?"k2":rk===3?"k3":"kx",bc=GC[p.grade]||"#60a5fa",
        gc=p.grade==="A"?"gA":p.grade==="B"?"gB":p.grade==="C"?"gC":"gD",sc="";
    DK.forEach(function(k,j){var v=p[k]||0,pc=Math.min(100,Math.round(v/DM[j]*100)),vc=v===0?"color:var(--rd);font-weight:800":v>=DM[j]?"color:var(--gn);font-weight:700":"color:var(--t1);font-weight:600";sc+='<td><div style="display:flex;align-items:center;gap:4px"><span style="width:28px;text-align:right;'+vc+';font-size:12px">'+v+'</span><div class="pb" style="flex:1;min-width:30px"><div class="pf" style="width:'+pc+'%;background:'+(v===0?"var(--rd)":bc)+'"></div></div></div></td>'});
    h+='<tr><td><span class="rk '+rc+'">'+rk+'</span></td><td><span class="gg '+gc+'">'+p.grade+'</span></td><td style="font-weight:600;color:var(--t1)">'+p.name+'</td><td style="color:var(--t2)">'+(p.city||"-")+'</td><td>'+p.stores+'</td>'+sc+'<td style="font-weight:800;font-size:14px;color:'+bc+'">'+p.total+'</td></tr>';

  document.getElementById("tb").innerHTML=h;
}
